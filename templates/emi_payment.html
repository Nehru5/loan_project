<!DOCTYPE html>
<html>
<head>
<title>EMI Payment</title>

<style>

/* ---------- Body ---------- */
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg,#e0f7fa,#f5f7fb);
    margin:0;
}

/* ---------- Heading ---------- */
h2 {
    text-align:center;
    color:#00796b;
    margin-top:40px;
}

/* ---------- Table ---------- */
table {
    width:90%;
    margin:40px auto;
    border-collapse: collapse;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* Header */
th {
    background: linear-gradient(90deg,#00796b,#26a69a);
    color: white;
    padding: 12px;
}

/* Cells */
td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #ddd;
}

/* Zebra */
tr:nth-child(even) td {
    background: #f1f9f8;
}

/* Hover (NO SHAKE) */
tr:hover td {
    background: #b2dfdb;
    color: #004d40;
}

/* Button */
a {
    background: #00796b;
    color: white;
    padding: 8px 15px;
    text-decoration: none;
    border-radius: 6px;
    transition: 0.3s;
}

a:hover {
    background: #26a69a;
}

/* Completed Badge */
.badge {
    background: linear-gradient(90deg, #2ecc71, #27ae60);
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    display: inline-block;
}

/* Responsive */
@media (max-width: 768px) {
    table, th, td {
        font-size: 14px;
    }
}
/* Disabled Button (Completed) */
.btn-disabled {
    background: linear-gradient(90deg, #9e9e9e, #bdbdbd);
    color: white;
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    cursor: not-allowed;
    font-size: 13px;
    font-weight: 500;
    opacity: 0.85;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Optional hover (very subtle, no movement) */
.btn-disabled:hover {
    opacity: 0.9;
}
</style>
</head>

<body>
<h2>EMI Payment</h2>

<table>
<tr>
<th>Loan Amount</th>
<th>EMI</th>
<th>Duration</th>
<th>Remaining</th>
<th>Action</th>
</tr>

{% for item in loans_data %}
<tr>
<td>₹ {{item.loan.approved_amount}}</td>
<td>₹ {{item.loan.emi}}</td>
<td>{{item.loan.duration}} months</td>
<td>{{item.remaining}}</td>

<td>
{% if item.remaining > 0 %}
<a href="/pay-emi/{{item.loan.id}}">Pay EMI</a>
{% else %}
<button class="btn-disabled" disabled>
<span class="badge">✔ Completed</span>
</button>
{% endif %}
</td>

</tr>
{% endfor %}

</table>

</body>
</html>
