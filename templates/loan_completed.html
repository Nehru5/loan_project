<!DOCTYPE html>
<html>
<head>
<title>Loan Completed</title>

<style>

/* ---------- Body ---------- */
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg,#e0f7fa,#f5f7fb);
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* ---------- Card ---------- */
.card {
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    text-align:center;
    width:350px;
    animation: fadeIn 0.6s ease;
}

/* ---------- Icon ---------- */
.icon {
    font-size:60px;
    color:#2ecc71;
    margin-bottom:15px;
}

/* ---------- Text ---------- */
h2 {
    color:#00796b;
    margin-bottom:10px;
}

p {
    color:#555;
    font-size:15px;
}

/* ---------- Button ---------- */
a {
    display:inline-block;
    margin-top:20px;
    padding:10px 20px;
    background:#00796b;
    color:white;
    text-decoration:none;
    border-radius:6px;
    transition:0.3s;
}

a:hover {
    background:#26a69a;
}

/* ---------- Animation ---------- */
@keyframes fadeIn {
    from { opacity:0; transform:translateY(20px); }
    to { opacity:1; transform:translateY(0); }
}

</style>
</head>

<body>

<div class="card">

<div class="icon">✔</div>

<h2>Loan Completed</h2>

<p>Your loan has been fully repaid.<br>
No further EMI payments are required.</p>

<a href="/dashboard/">Go to Dashboard</a>

</div>

</body>
</html>
